<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computación Grafica - Level 1</title>
    <link rel="icon" type="image/png" href="../../../src/img/USB_Cali_Logo.svg.png">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../src/css/mainlevel.css">

    <style>
        /* Estilos para el cuadro informativo de controles */
        #info-container {
            position: fixed;
            bottom: 50px;
            left: 40px;
            z-index: 100; /* Asegura que esté sobre el canvas */
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 5px;
            border-left: 4px solid #ff0000; /* Detalle rojo Stranger Things */
            max-width: 320px;
            pointer-events: none; /* Para que no estorbe al hacer clic en el 3D */
            font-family: sans-serif;
        }

        #control-title {
            margin: 0;
            font-size: 1.1rem;
            text-transform: uppercase;
            color: #ff0000;
        }

        #control-desc {
            margin: 5px 0 0;
            font-size: 0.85rem;
            line-height: 1.3;
            opacity: 0.9;
        }
    </style>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.183.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.0/examples/jsm/",
            "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.js"
        }
    }
    </script>
</head>
<body>
    <div class="bg"></div>

    <section id="navbar">
        <nav class="navbar navbar-expand-lg custom-navbar">
            <div class="container-fluid">
                <a class="navbar-brand d-flex align-items-center" href="../../index.html">
                    <img src="../../../src/img/USB_Cali_Logo.svg.png" alt="Logo" width="40" class="me-2">
                    Universidad San Buenaventura Cali
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav mx-auto">
                        <li class="nav-item"><a class="nav-link" href="#">Inicio</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Tema</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Curiosidades</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Apoyo</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Compañeros</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Actividades</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Soporte</a></li>
                    </ul>

                    <div class="d-flex gap-2">
                        <a href="#" class="btn btn-outline-secondary">Log in</a>
                        <a href="#" class="btn btn-secondary">Sign up</a>
                    </div>
                </div>
            </div>
        </nav>
    </section>

    <div id="container-3d"></div>

    <div id="info-container">
        <h3 id="control-title">Orbit Controls</h3>
        <p id="control-desc">Permite rotar alrededor del modelo, hacer zoom y desplazarse.</p>
    </div>

    <audio loop autoplay id="myAudio2">
        <source src="../src/sounds/max.mp3" type="audio/mpeg">
    </audio>

    <script type="module" src="../src/js/mainlevel.js"></script>
</body>
</html>
