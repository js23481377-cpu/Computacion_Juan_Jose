<!DOCTYPE html>
<html lang="en">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Modeling</title>
    <link rel="stylesheet" href="./src/css/main.css">
    <!-- Import the component -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>

    
         
</head>

<body>

 <section id="navbar">
        <nav class="navbar navbar-expand-lg custom-navbar">
            <div class="container-fluid">
                <a class="navbar-brand d-flex align-items-center" href="../../index.html">
                    <img src="../../src/img/USB_Cali_Logo.svg.png" alt="Logo" width="40" class="me-2">
                   Computacion grafica 2026
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav mx-auto">
                        <li class="nav-item"><a class="nav-link" href="#">Temas</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Curiosidades</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Apoyo</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Compañeros</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Actividades</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Soporte</a></li>
                    
                    </ul>

                    <div class="d-flex gap-2">
                        <a href="#" class="btn btn-outline-secondary">Log in</a>
                        <a href="#" class="btn btn-secondary">Sign up</a>
                    </div>

                </div>
            </div>
        </nav>
    </section>



    <div class="st-wrapper">
    <div class="st">
        <div class="st-top">
            <div class="st-bound st-bound-full"></div>
            <p><span class="st-drop st-stranger-s">S</span><span class="st-stranger-t">t</span><span
                    class="st-stranger-r">r</span><span class="st-stranger-a">a</span><span
                    class="st-stranger-n">n</span><span class="st-stranger-g">g</span><span
                    class="st-stranger-e">e</span><span class="st-drop st-stranger-r-2">r</span>
            </p>
            <div class="st-bound st-bound-mini st-bound-left"></div>
            <div class="st-bound st-bound-mini st-bound-right"></div>
        </div>
        <div class="st-bottom">
            <p><span class="st-things-t">T</span><span class="st-things-h">h</span><span
                    class="st-things-i">i</span><span class="st-things-n">n</span><span
                    class="st-things-g">g</span><span class="st-things-s">s</span></p>
        </div>
    </div>
</div>

    <!-- Use it like any other HTML element -->
    <model-viewer alt="Scene 3d" src="./src/models/glb/scene.glb" shadow-intensity="1" ar camera-controls
        touch-action="pan-y">

        <button slot="ar-button" id="ar-button">
            View in your space
        </button>

        <div id="ar-prompt">
            <img src="./src/img/hand.png">
        </div>

        <button id="ar-failure">
            AR is not tracking!
        </button>

        <div class="slider">
            <div class="slides">
                <button class="slide selected" onclick="switchSrc(this, 'lamp')"
                    style="background-image: url('./src/img/lamp\ .png');">
                </button>
                <button class="slide" onclick="switchSrc(this, 'once')"
                    style="background-image: url('./src/img/once\ .png">
                </button>
                <button class="slide" onclick="switchSrc(this, 'scene')"
                    style="background-image: url('./src/img/scene\ .png');">
                </button>
            </div>
        </div>
    </model-viewer>

    <script type="module">
        const modelViewer = document.querySelector("model-viewer");

        window.switchSrc = (element, name) => {
            const base = "./src/models/glb/" + name;
            modelViewer.src = base + '.glb';
            const slides = document.querySelectorAll(".slide");
            slides.forEach((element) => { element.classList.remove("selected"); });
            element.classList.add("selected");
        };

        document.querySelector(".slider").addEventListener('beforexrselect', (ev) => {
            // Keep slider interactions from affecting the XR scene.
            ev.preventDefault();
        });
    </script>

</body>

</html>
