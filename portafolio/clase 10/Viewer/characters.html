<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Character Selection - Graphics 2026</title>
    <link rel="stylesheet" href="../src/css/main.css"> <link rel="stylesheet" href="../src/css/characters.css"> </head>
<body>
    <div class="bg"></div>
    <div class="bg bg2"></div>
    <div class="bg bg3"></div>

    <div class="selection-container">
        <div class="character-preview">
            <img src="../src/models/obj/player/once.png" alt="Character" id="char-img">
        </div>

        <div class="character-info">
            <h2 id="char-name">ELEVEN</h2>
            <p id="char-description">
                Posee habilidades psicoquinéticas y telepáticas. Es la clave para cerrar el portal al Upside Down.
            </p>

            
            
            <div class="selection-controls">
                <button class="btn-nav" id="prev-btn">◀</button>
                <button class="btn-select">SELECT CHARACTER</button>
                <button class="btn-nav" id="next-btn">▶</button>
            </div>

            <a href="../index.html" class="btn-back">Back to Menu</a>
        </div>
    </div>

    <script src="../src/js/characters.js"></script>
</body>
</html>
